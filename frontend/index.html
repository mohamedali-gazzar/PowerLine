<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F16722" />
    <title>PowerLine — Offer Configurator</title>
    <style>
      /* Boot splash — shows instantly (before the React bundle loads), then
         fades out on mount (see main.tsx). Inline so it needs no JS/CSS first. */
      #pl-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        transition: opacity 0.35s ease;
      }
      #pl-splash.pl-hide {
        opacity: 0;
        pointer-events: none;
      }
      #pl-splash .pl-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 22px;
      }
      #pl-splash .pl-logo {
        width: 210px;
        max-width: 58vw;
        height: auto;
        animation: pl-rise 0.5s cubic-bezier(0.2, 0.7, 0.3, 1) both;
      }
      #pl-splash .pl-bar {
        position: relative;
        width: 180px;
        height: 3px;
        border-radius: 999px;
        background: #ededf0;
        overflow: hidden;
      }
      #pl-splash .pl-bar > span {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 38%;
        border-radius: 999px;
        background: #f16722;
        animation: pl-slide 1.1s ease-in-out infinite;
      }
      @keyframes pl-slide {
        0% { transform: translateX(-130%); }
        100% { transform: translateX(360%); }
      }
      @keyframes pl-rise {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        #pl-splash { transition: none; }
        #pl-splash .pl-logo { animation: none; }
        #pl-splash .pl-bar > span { animation: none; width: 100%; opacity: 0.45; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="pl-splash" role="status" aria-label="Loading PowerLine">
      <div class="pl-inner">
        <img class="pl-logo" src="/brand/logo-color.png" alt="PowerLine" />
        <div class="pl-bar"><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
